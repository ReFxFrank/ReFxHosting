# Promtail — ships Docker container logs into Loki.
# Discovers all containers on the host via the Docker socket and labels each
# stream by container name / compose service so logs are filterable in Grafana.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      # container name (strip leading slash)
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      # compose project + service labels when present
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: project
      - target_label: job
        replacement: docker
