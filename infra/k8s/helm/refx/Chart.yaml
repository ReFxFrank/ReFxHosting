apiVersion: v2
name: refx
description: ReFx Hosting central panel (panel-api + web) for Kubernetes.
type: application
version: 0.1.0
appVersion: "0.1.0"
home: https://github.com/refxfrank/refxhosting
maintainers:
  - name: ReFx Hosting contributors
keywords:
  - game-hosting
  - panel
  - saas
# Backing datastores are optional subcharts; in production prefer managed
# Postgres/Redis/S3. Toggle via values: postgresql.enabled / redis.enabled.
dependencies:
  - name: postgresql
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "19.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
