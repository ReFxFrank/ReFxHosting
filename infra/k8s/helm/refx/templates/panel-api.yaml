{{- if .Values.panelApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "refx.fullname" . }}-panel-api
  labels:
    {{- include "refx.labels" . | nindent 4 }}
    app.kubernetes.io/component: panel-api
spec:
  {{- if not .Values.panelApi.autoscaling.enabled }}
  replicas: {{ .Values.panelApi.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "refx.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: panel-api
  template:
    metadata:
      labels:
        {{- include "refx.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: panel-api
    spec:
      serviceAccountName: {{ include "refx.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: panel-api
          image: {{ include "refx.image" (dict "Values" .Values "Chart" .Chart "image" .Values.panelApi.image) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.panelApi.port }}
          envFrom:
            - secretRef:
                name: {{ include "refx.secretName" . }}
            - configMapRef:
                name: {{ include "refx.fullname" . }}-config
          env:
            - name: PORT
              value: {{ .Values.panelApi.port | quote }}
            - name: API_PREFIX
              value: {{ .Values.panelApi.apiPrefix | quote }}
            {{- range $k, $v := .Values.panelApi.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.panelApi.livenessPath }}
              port: {{ .Values.panelApi.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: {{ .Values.panelApi.readinessPath }}
              port: {{ .Values.panelApi.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          resources: {{- toYaml .Values.panelApi.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "refx.fullname" . }}-panel-api
  labels:
    {{- include "refx.labels" . | nindent 4 }}
    app.kubernetes.io/component: panel-api
spec:
  type: ClusterIP
  selector:
    {{- include "refx.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: panel-api
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.panelApi.port }}
{{- if .Values.panelApi.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "refx.fullname" . }}-panel-api
  labels: {{- include "refx.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "refx.fullname" . }}-panel-api
  minReplicas: {{ .Values.panelApi.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.panelApi.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.panelApi.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
