<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="SIMULATION">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#0c1830"/>
      <stop offset="1" stop-color="#070b12"/>
    </linearGradient>
    <radialGradient id="acc" cx="0.18" cy="0.16" r="0.9">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.45"/>
      <stop offset="0.55" stop-color="#a78bfa" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blu" cx="0.9" cy="1" r="0.9">
      <stop offset="0" stop-color="#0072ff" stop-opacity="0.4"/>
      <stop offset="0.6" stop-color="#0072ff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#0072ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#grid)"/>
  <rect width="800" height="450" fill="url(#acc)"/>
  <rect width="800" height="450" fill="url(#blu)"/>
  <rect x="0" y="0" width="800" height="3" fill="url(#beam)"/>

  <!-- soft accent orb -->
  <circle cx="150" cy="120" r="120" fill="#a78bfa" opacity="0.10"/>

  <g font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <text x="400" y="206" font-size="17" font-weight="600" letter-spacing="7" fill="#a78bfa" opacity="0.95">REFX HOSTING</text>
    <text x="400" y="262" font-size="46" font-weight="800" letter-spacing="2" fill="#eaf2ff">SIMULATION</text>
  </g>
</svg>
