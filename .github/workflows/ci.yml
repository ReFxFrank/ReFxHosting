name: CI

on:
  push:
    branches: [main]
    # Skip CI for docs/asset-only changes — they can't break builds or tests.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "apps/web/public/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "apps/web/public/**"
      - "LICENSE"
      - ".gitignore"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  prisma:
    name: Prisma schema validate
    runs-on: ubuntu-latest
    env:
      # `prisma validate` resolves the datasource url = env("DATABASE_URL"); a
      # dummy value is enough (no DB connection is made). Without it the step
      # fails with a getConfig validation error on every run.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm install
      - run: npx prisma validate --schema database/prisma/schema.prisma
      - run: npx prisma generate --schema database/prisma/schema.prisma

  # ---------------------------------------------------------------------------
  node-apps:
    name: ${{ matrix.app }} (lint · typecheck · build · test)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [panel-api, web, shared]
        include:
          - app: panel-api
            dir: apps/panel-api
          - app: web
            dir: apps/web
          - app: shared
            dir: packages/shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install workspace deps
        run: npm ci || npm install
      - name: Generate Prisma client (panel-api)
        if: matrix.app == 'panel-api'
        run: npx prisma generate --schema database/prisma/schema.prisma
      - name: Lint
        working-directory: ${{ matrix.dir }}
        run: npm run lint --if-present
      - name: Typecheck
        working-directory: ${{ matrix.dir }}
        run: npm run typecheck --if-present
      - name: Build
        working-directory: ${{ matrix.dir }}
        run: npm run build --if-present
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
      - name: Test
        working-directory: ${{ matrix.dir }}
        run: npm run test --if-present -- --passWithNoTests
      # e2e (supertest, mocked I/O — no DB/network) guards the integration wiring
      # that unit tests mock away. panel-api only; setup-e2e.ts provides env.
      - name: Test (e2e)
        if: matrix.app == 'panel-api'
        working-directory: ${{ matrix.dir }}
        run: npm run test:e2e

  # ---------------------------------------------------------------------------
  node-agent:
    name: node-agent (vet · build · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/node-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: apps/node-agent/go.sum
      - run: go mod download
      - run: go vet ./...
      - name: Build (host)
        run: go build ./...
      - name: Cross-compile matrix
        run: |
          GOOS=linux   GOARCH=amd64 go build -o /dev/null ./cmd/refx-agent
          GOOS=linux   GOARCH=arm64 go build -o /dev/null ./cmd/refx-agent
          GOOS=windows GOARCH=amd64 go build -o /dev/null ./cmd/refx-agent
      - run: go test ./...

  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker image build (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [node-apps, node-agent]
    # Expensive smoke test — only on PRs (deploys build images themselves, and
    # release.yml builds + pushes on tags). Skips it on every direct push to main.
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: panel-api
            context: .
            dockerfile: apps/panel-api/Dockerfile
          - image: web
            context: apps/web
            dockerfile: apps/web/Dockerfile
          - image: node-agent
            context: apps/node-agent
            dockerfile: apps/node-agent/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
