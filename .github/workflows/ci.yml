name: CI

on:
  push:
    branches: [main]
    # Skip CI for docs/asset-only changes — they can't break builds or tests.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "apps/web/public/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "apps/web/public/**"
      - "LICENSE"
      - ".gitignore"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  prisma:
    name: Prisma schema validate
    runs-on: ubuntu-latest
    env:
      # `prisma validate` resolves the datasource url = env("DATABASE_URL"); a
      # dummy value is enough (no DB connection is made). Without it the step
      # fails with a getConfig validation error on every run.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm install
      # Prisma 7 removed --schema; config (schema path) lives in
      # apps/panel-api/prisma.config.ts, so run the CLI from there.
      - run: npx prisma validate
        working-directory: apps/panel-api
      - run: npx prisma generate
        working-directory: apps/panel-api

  # ---------------------------------------------------------------------------
  # Applies the ENTIRE committed migration chain from an empty database on a real
  # ephemeral Postgres, then fails on any schema drift between the migration
  # history and schema.prisma. Also asserts the migrate entrypoint is fail-closed
  # so a failed migration can never silently continue (no db push --accept-data-loss,
  # no auto migrate-resolve, non-zero exit on deploy failure). See docs/25.
  migrations:
    name: Migrations (apply chain + drift + fail-closed)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: refx
          POSTGRES_PASSWORD: refx
          POSTGRES_DB: refx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U refx"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://refx:refx@localhost:5432/refx?schema=public
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm install
      - name: Generate Prisma client
        working-directory: apps/panel-api
        run: npx prisma generate
      - name: Apply full migration chain from empty DB
        working-directory: apps/panel-api
        run: npx prisma migrate deploy
      - name: Fail on schema drift (migrated DB vs schema.prisma)
        working-directory: apps/panel-api
        # After migrate deploy applied the full chain to the DB above, diff
        # schema.prisma against that live database. --exit-code returns 2 when
        # they diverge (a schema.prisma change shipped without a matching
        # migration, or vice versa). Using --to-config-datasource avoids needing
        # a separate shadow database.
        run: >-
          npx prisma migrate diff
          --from-schema ../../database/prisma/schema.prisma
          --to-config-datasource
          --exit-code
      - name: Assert migrate entrypoint is fail-closed
        run: bash infra/scripts/assert-migrate-fail-closed.sh

  # ---------------------------------------------------------------------------
  node-apps:
    name: ${{ matrix.app }} (lint · typecheck · build · test)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [panel-api, web, shared]
        include:
          - app: panel-api
            dir: apps/panel-api
          - app: web
            dir: apps/web
          - app: shared
            dir: packages/shared
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - name: Install workspace deps
        run: npm ci || npm install
      - name: Generate Prisma client (panel-api)
        if: matrix.app == 'panel-api'
        working-directory: ${{ matrix.dir }}
        # Prisma 7 removed --schema; the schema path lives in prisma.config.ts.
        run: npm run prisma:generate
      - name: Lint
        working-directory: ${{ matrix.dir }}
        run: npm run lint --if-present
      - name: Typecheck
        working-directory: ${{ matrix.dir }}
        run: npm run typecheck --if-present
      - name: Build
        working-directory: ${{ matrix.dir }}
        run: npm run build --if-present
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
      - name: Test
        working-directory: ${{ matrix.dir }}
        run: npm run test --if-present -- --passWithNoTests
      # e2e (supertest, mocked I/O — no DB/network) guards the integration wiring
      # that unit tests mock away. panel-api only; setup-e2e.ts provides env.
      - name: Test (e2e)
        if: matrix.app == 'panel-api'
        working-directory: ${{ matrix.dir }}
        run: npm run test:e2e

  # ---------------------------------------------------------------------------
  node-agent:
    name: node-agent (vet · build · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/node-agent
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: apps/node-agent/go.sum
      - run: go mod download
      - run: go vet ./...
      - name: Build (host)
        run: go build ./...
      - name: Cross-compile matrix
        run: |
          GOOS=linux   GOARCH=amd64 go build -o /dev/null ./cmd/refx-agent
          GOOS=linux   GOARCH=arm64 go build -o /dev/null ./cmd/refx-agent
          GOOS=windows GOARCH=amd64 go build -o /dev/null ./cmd/refx-agent
      - run: go test ./...

  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker image build (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [node-apps, node-agent]
    # Expensive smoke test — only on PRs (deploys build images themselves, and
    # release.yml builds + pushes on tags). Skips it on every direct push to main.
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: panel-api
            context: .
            dockerfile: apps/panel-api/Dockerfile
          - image: web
            context: apps/web
            dockerfile: apps/web/Dockerfile
          - image: node-agent
            context: apps/node-agent
            dockerfile: apps/node-agent/Dockerfile
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
