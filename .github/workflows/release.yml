name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag to create (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  images:
    name: Publish ${{ matrix.image }} image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: panel-api
            context: .
            dockerfile: apps/panel-api/Dockerfile
          - image: web
            context: apps/web
            dockerfile: apps/web/Dockerfile
          - image: node-agent
            context: apps/node-agent
            dockerfile: apps/node-agent/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  agent-binaries:
    name: Cross-compile node-agent binaries
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/node-agent
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: apps/node-agent/go.sum
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          out="refx-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/${out}" ./cmd/refx-agent
          (cd dist && sha256sum "${out}" > "${out}.sha256")
      - uses: actions/upload-artifact@v7
        with:
          name: agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: apps/node-agent/dist/*

  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    # Only needs the agent binaries (what's attached to the release); the Docker
    # images publish to ghcr in parallel and aren't part of the release, so don't
    # block the release (and the agent self-update) on the slow multi-arch build.
    needs: [agent-binaries]
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          # Only the agent binaries. docker/build-push-action also uploads
          # "*.dockerbuild" build-record artifacts; downloading those is flaky
          # (it fails the whole step) and they don't belong on the release.
          pattern: agent-*
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          # On a manual run, create this tag at the current commit; on a tag
          # push, use the pushed tag.
          tag_name: ${{ inputs.version || github.ref_name }}
          name: ${{ inputs.version || github.ref_name }}
          generate_release_notes: true
          files: artifacts/*
